services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: dulys_house
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: ./backend
    init: true
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      APP_KEY: "${APP_KEY:-base64:flh+d1U3MR/aQKI42cLcikmtQTa/kQC76q6eAntkAxU=}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: dulys_house
      DB_USERNAME: root
      DB_PASSWORD: secret
    volumes:
      - backend-storage:/var/www/storage
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:8000/up') === false ? 1 : 0);"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    init: true
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql-data:
  backend-storage:
